name: BSP data pipeline

# Laptop-independent scheduler. Runs the same pipeline the local machine runs,
# but in GitHub's cloud so it fires whether or not the laptop is awake/online.
# It rebuilds the data, then publishes the dashboard + its JSON to GitHub Pages
# (Pages artifacts are ephemeral, so the 44 MB player-profiles.json does NOT
# bloat git history — unlike committing it back every run would).
#
# SETUP REQUIRED (see AUTOMATION.md): add repo secrets ODDS_API_KEY and
# API_TENNIS_KEY, and enable Pages (Settings → Pages → Source: GitHub Actions).

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes (UTC). GitHub may delay under load.
  workflow_dispatch:          # allow manual "Run workflow" from the Actions tab

# Never let two runs overlap; cancel an in-progress run if a newer one starts.
concurrency:
  group: bsp-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Persist the heavy derived caches + TML archive between runs so each run
      # is fast and makes minimal API calls (matches how the local run reuses
      # them). Keyed per-day so it refreshes but still restores older caches.
      - name: Restore pipeline caches
        uses: actions/cache@v4
        with:
          path: |
            player-profiles-cache.json
            player-profiles.json
            player-tournament-history.json
            historical-match-stats.json
            tournament-profiles.json
            point-by-point-cache.json
            tml-cache
          key: bsp-caches-${{ github.run_id }}
          restore-keys: |
            bsp-caches-

      - name: Run pipeline (with retry + health tracking)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          DOTENV_CONFIG_QUIET: 'true'
        run: node run-pipeline.js github-actions

      # Backfill the stats + point logs behind the Overview / Career-record
      # drill-down, ONE call per tracked player (the player-keyed fixture window
      # already carries both inline). Runs BEFORE the shard build on purpose:
      # it only fills point-by-point-cache.json, and every match it caches is one
      # the next step then does NOT have to fetch per-match — so it speeds that
      # job up rather than competing with it. Self-terminating: once every
      # tracked player's rows are cached it makes no calls at all.
      - name: Backfill history match shards (best-effort)
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
        run: node backfill-history-shards.js || true

      # Point-by-point sidecar (Task 4): lazy companion the dashboard fetches on
      # demand for finished matches. Best-effort — never block the deploy: a
      # failure here leaves the previous point-by-point.json (from cache) or none.
      - name: Build point-by-point sidecar (best-effort)
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
        run: node build-point-by-point.js || true

      # Market-performance shards, rebuilt every run against the profiles the pipeline
      # just refreshed. Reads only the committed odds-archive/ CSVs, so it makes no
      # network calls and cannot be broken by tennis-data.co.uk being down (it was, on
      # 2026-07-18). Rebuilding here rather than relying on the committed shards is what
      # keeps players who newly enter the profile roster from silently missing the block.
      - name: Build market performance shards (best-effort)
        run: node build-odds-performance.js || true

      # Assemble the static site: the dashboard as index.html + the JSON files it
      # fetches (all same-origin, relative paths) + the health file.
      #
      # Every file the browser can ask for must be copied here explicitly — the
      # repo is NOT the document root, only _site is. Anything committed but not
      # copied 404s silently at runtime, which is how sign-in stayed broken.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp bsp-consult-dashboard.html _site/index.html
          # The auth pages link to the dashboard by its repo filename, so publish
          # it under that name too, not just as index.html.
          cp bsp-consult-dashboard.html _site/bsp-consult-dashboard.html
          cp auth.html account.html funnel.html auth.js _site/
          cp matches.json tournament-profiles.json tournament-progression.json player-profiles.json _site/
          cp career-splits.json _site/
          # Career-record drill-down, one shard per player. The index gates every
          # request, so if it doesn't ship, no cell in the Career-record table
          # opens at all — publish both or neither.
          cp career-history-index.json _site/ 2>/dev/null || true
          cp -r career-history _site/ 2>/dev/null || true
          cp point-by-point.json _site/ 2>/dev/null || true
          cp pbp-index.json _site/ 2>/dev/null || true
          cp -r pbp _site/ 2>/dev/null || true
          cp setstats-index.json _site/ 2>/dev/null || true
          cp matchstats-index.json _site/ 2>/dev/null || true
          cp -r setstats _site/ 2>/dev/null || true
          cp form-index.json _site/ 2>/dev/null || true
          cp -r form _site/ 2>/dev/null || true
          # Per-book odds timelines, lazy per match. The index gates the Odds
          # tab: without it every match silently falls back to the reduced view,
          # which is exactly how the movement chart went missing for three days.
          cp odds-index.json _site/ 2>/dev/null || true
          cp -r odds _site/ 2>/dev/null || true
          cp pipeline-health.json _site/ 2>/dev/null || true
          # Playing Styles + Player Profile redesign data: Elo pill, clutch rating,
          # archetype rosters, and the self-computed matchup matrix. Committed but
          # not copied = silent 404 (Elo pill degrades; the Styles tab goes empty).
          cp elo-ratings.json _site/ 2>/dev/null || true
          cp clutch-rating.json _site/ 2>/dev/null || true
          cp archetypes-classified.json _site/ 2>/dev/null || true
          cp matchup-matrix.json _site/ 2>/dev/null || true
          cp playing-styles.json _site/ 2>/dev/null || true
          # Six-axis style radar for the Match Analysis "Playing style" tab.
          # Percentile block only — tools/build-style-radar.js strips the raw
          # Match Charting rates, which are internal-only and must not be served.
          cp style-radar.json _site/ 2>/dev/null || true
          # Market performance: the index gates the profile block (no entry = no block,
          # so a missing index silently hides the feature for every player), the shards
          # carry the detail. odds-archive/ is deliberately NOT copied — it is the raw
          # source the builder reads, never fetched by the browser.
          cp odds-performance-index.json _site/ 2>/dev/null || true
          cp -r odds-performance _site/ 2>/dev/null || true

      # Fail loudly if a file the pages reference is missing from the artifact.
      # A 404 on auth.js only shows up as a dead button in the browser, so catch
      # it here where it is still a build error.
      - name: Assert site completeness
        run: |
          # form-index.json gates the Form tab: the dashboard reads it before it
          # will fetch a single form shard, so if it 404s the tab is empty for
          # every match and nothing else complains. bsp-pipeline.js writes it on
          # every run alongside matches.json.
          for f in index.html bsp-consult-dashboard.html auth.html auth.js account.html funnel.html \
                   matches.json player-profiles.json career-splits.json form-index.json \
                   matchup-matrix.json playing-styles.json style-radar.json \
                   odds-performance-index.json odds-index.json; do
            [ -s "_site/$f" ] || { echo "MISSING from _site: $f"; exit 1; }
          done
          echo "All referenced files present in _site."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # Surface failures loudly: if the pipeline could not produce a fresh
      # success, fail the job so GitHub emails/notifies (and the health file
      # published above shows the banner on the live dashboard).
      - name: Assert pipeline freshness
        run: |
          node -e '
            const h = require("./pipeline-health.json");
            const ageMin = (Date.now() - new Date(h.lastSuccess).getTime()) / 60000;
            if (!h.lastSuccess || ageMin > 30) {
              console.error("Pipeline health stale/failed:", JSON.stringify(h));
              process.exit(1);
            }
            console.log("Pipeline healthy; last success", Math.round(ageMin), "min ago");
          '
